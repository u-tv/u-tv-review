name: U-TV TMDB Daily 5

on:
  schedule:
    - cron: "0 6 * * *"   # roz subah 6 baje (UTC) - chaaho to time badal sakte ho
  workflow_dispatch:       # manually run karne ke liye button

jobs:
  daily-tmdb:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependency
        run: npm install node-fetch@2

      - name: Update daily-posts.json from TMDB
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: node .github/scripts/daily-tmdb.js

      - name: Commit daily-posts.json
        run: |
          if git status --porcelain | grep -q 'daily-posts.json'; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add daily-posts.json
            git commit -m "✅ TMDB daily posts update"
            git push
          else
            echo "No daily changes"
          fi

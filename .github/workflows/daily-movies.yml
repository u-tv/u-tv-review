name: Daily New Movies
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  addmovies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          npm i node-fetch@2
          node -pe "
          const fetch = require('node-fetch');
          fetch('https://api.themoviedb.org/3/trending/movie/day?api_key=5bf61a62fd4647aa7debed7d6f2db079')
            .then(r=>r.json())
            .then(d=>{
              const fs = require('fs');
              const old = fs.readFileSync('posts.json','utf8') ? JSON.parse(fs.readFileSync('posts.json','utf8')) : [];
              const newMovies = d.results.slice(0,3).map(m=>({
                title: m.title + ' Review',
                image: 'https://image.tmdb.org/t/p/w500' + m.poster_path,
                rating: m.vote_average.toFixed(1),
                critics: Math.round(m.vote_average*10) + '%',
                review: 'Today trending!',
                time: new Date().toLocaleTimeString('en-IN')
              }));
              fs.writeFileSync('posts.json', JSON.stringify([...old, ...newMovies]));
              console.log('Added 3 new movies!');
            });
          "
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Daily new movies added

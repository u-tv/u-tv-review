name: U-TV Ultimate Sync
on:
  schedule:
    - cron: '30 1,3,9,12,14 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Run Sync
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node sync.js
      - name: Push Changes
        run: |
          git config --global user.name "U-TV-Bot"
          git config --global user.email "bot@u-tv.com"
          git add posts.json
          git commit -m "Auto-Update" || exit 0
          git push

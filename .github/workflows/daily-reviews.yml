name: U-TV Daily Reviews
on:
  workflow_dispatch:     # ← YE LINE RUN BUTTON KE LIYE
  schedule:
    - cron: '30 0,2,9,13,15 * * *'

jobs:
  create-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate 5 Daily Reviews
        run: |
          cat > posts.json << 'EOF'
          [
            {"title":"Avengers Review","image":"https://image.tmdb.org/t/p/w500/rr7E0No24fQMh4X8ramlpD8d8Tdx.jpg","rating":"8.5","critics":"92%","review":"Epic Marvel finale!","time":"6:00 AM","is_certified":true},
            {"title":"Spider-Man Review","image":"https://image.tmdb.org/t/p/w500/4q2NWJrjyS1zmFhcllUZxWR1pEr.jpg","rating":"8.2","critics":"93%","review":"Multiverse magic!","time":"8:00 AM","is_certified":true},
            {"title":"Dune Review","image":"https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPciJZt58cL.jpg","rating":"8.0","critics":"83%","review":"Sci-fi masterpiece","time":"3:00 PM","is_certified":true},
            {"title":"RRR Review","image":"https://image.tmdb.org/t/p/w500/oD8MSvAp20iKgY7cdXAaD4i3gSy.jpg","rating":"8.4","critics":"95%","review":"Global sensation!","time":"7:00 PM","is_certified":true},
            {"title":"Oppenheimer Review","image":"https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDyehTduEYtC94G.jpg","rating":"8.7","critics":"93%","review":"Nolan brilliance","time":"9:00 PM","is_certified":true}
          ]
          EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '✅ Daily Reviews Added'

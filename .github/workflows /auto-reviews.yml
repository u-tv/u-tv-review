name: U-TV Daily Reviews
on:
  schedule:
    - cron: '30 0,2,9,13,15 * * *'  # 6AM,8AM,3PM,7PM,9PM IST
  workflow_dispatch:  # YE LINE ZAROORI HAI!

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create 5 Daily Reviews
        run: |
          cat > posts.json << EOF
          [
            {
              "title": "Avengers: Endgame Review",
              "image": "https://image.tmdb.org/t/p/w500/rr7E0No24fQMh4X8ramlpD8d8Tdx.jpg",
              "rating": "8.5",
              "critics": "92%",
              "review": "Epic conclusion to Marvel saga. Perfect blend of action, emotion & spectacle.",
              "time": "6:00 AM IST",
              "is_certified": true
            },
            {
              "title": "Spider-Man No Way Home Review", 
              "image": "https://image.tmdb.org/t/p/w500/4q2NWJrjyS1zmFhcllUZxWR1pEr.jpg",
              "rating": "8.2",
              "critics": "93%",
              "review": "Multiverse madness! Nostalgia meets fresh storytelling brilliantly.",
              "time": "8:00 AM IST",
              "is_certified": true
            },
            {
              "title": "Dune Review",
              "image": "https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPciJZt58cL.jpg", 
              "rating": "8.0",
              "critics": "83%",
              "review": "Visually stunning sci-fi epic. Sets new benchmark for world-building.",
              "time": "3:00 PM IST",
              "is_certified": true
            },
            {
              "title": "Oppenheimer Review",
              "image": "https://image.tmdb.org/t/p/w500/8Gxv8gSFCU0XGDyehTduEYtC94G.jpg",
              "rating": "8.7",
              "critics": "93%",
              "review": "Masterclass in filmmaking. Nolan delivers another thought-provoking masterpiece.",
              "time": "7:00 PM IST", 
              "is_certified": true
            },
            {
              "title": "RRR Review",
              "image": "https://image.tmdb.org/t/p/w500/oD8MSvAp20iKgY7cdXAaD4i3gSy.jpg",
              "rating": "8.4",
              "critics": "95%",
              "review": "Indian cinema's global triumph! Powerhouse performances & breathtaking action.",
              "time": "9:00 PM IST",
              "is_certified": true
            }
          ]
          EOF
      
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '✅ Added 5 Daily Reviews'

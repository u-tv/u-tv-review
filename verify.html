<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Verification</title>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #timer { font-size: 40px; color: #38bdf8; font-weight: bold; margin: 20px; }
    </style>
</head>
<body>
    <img src="https://telegram.org/img/t_logo.png" width="80" alt="Telegram">
    <h1>Please Verify You Are Human</h1>
    <p>सुरक्षा कारणों से, कृपया 20 सेकंड प्रतीक्षा करें।</p>
    
    <div class="loader"></div>
    <div id="timer">20</div>
    
    <p>वेरिफिकेशन पूरा होते ही आप वापस चैट पर पहुँच जाएंगे।</p>

    <script>
        let timeLeft = 20;
        let timerElement = document.getElementById('timer');

        let countdown = setInterval(function() {
            timeLeft--;
            timerElement.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                
                // आपके बॉट का यूजरनेम यहाँ सेट है
                let botUrl = "tg://resolve?domain=Verfication_u_bot";
                let fallbackUrl = "https://t.me/Verfication_u_bot";

                // रीडायरेक्ट करने की कोशिश
                window.location.replace(botUrl);

                // अगर 500ms में रीडायरेक्ट नहीं हुआ, तो वेब लिंक का इस्तेमाल करें
                setTimeout(function() {
                    window.location.href = fallbackUrl;
                }, 500);
            }
        }, 1000);
    </script>
</body>
</html>

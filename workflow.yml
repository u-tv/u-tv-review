name: U-TV Daily Reviews
on:
  schedule:
    - cron: '30 0,2,9,13,15 * * *'  # UTC for IST times
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Trending & Generate Reviews
        run: |
          curl -s "https://api.themoviedb.org/3/trending/movie/day?api_key=5bf61a62fd4647aa7debed7d6f2db079" > trending.json
          node -e "
            const fs = require('fs');
            const tmdb = JSON.parse(fs.readFileSync('trending.json'));
            const gemini = fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyBTLkHyTKZpBEnZZvgTqAm0kvvmF38kgnE', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({contents: [{parts: [{text: 'Generate 5 movie reviews for: ' + tmdb.results.slice(0,5).map(m=>m.title).join(', ')}]}]})
            }).then(r=>r.json());
            // Simplified: Write 5 sample reviews to posts.json
            const posts = tmdb.results.slice(0,5).map((m,i) => ({
              title: m.title,
              image: 'https://image.tmdb.org/t/p/w500' + m.poster_path,
              rating: (7 + i).toString(),
              critics: (80 + i*3) + '%',
              review: 'AI generated review: Excellent film with strong story. ' + new Date().toLocaleTimeString('hi-IST'),
              time: new Date().toLocaleTimeString('hi-IST'),
              is_certified: true
            }));
            fs.writeFileSync('posts.json', JSON.stringify(posts));
          "
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Auto daily reviews added'

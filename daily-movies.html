<!DOCTYPE html>
<html>
<head>
    <title>Daily Movies - UTV Review</title>
    <meta name="viewport" content="width=device-width">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#000;color:#fff;padding:20px;line-height:1.6}
        .header{text-align:center;margin-bottom:30px}
        .header h1{font-size:2.5em;color:#ff0000;text-shadow:2px 2px 4px rgba(255,0,0,0.3)}
        .movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
        .movie-card{background:linear-gradient(145deg,#1a1a1a,#0d0d0d);padding:20px;border-radius:15px;border:2px solid #333;transition:transform 0.3s,box-shadow 0.3s}
        .movie-card:hover{transform:translateY(-10px);box-shadow:0 20px 40px rgba(255,0,0,0.3)}
        .movie-poster{width:100%;height:400px;object-fit:cover;border-radius:10px;cursor:pointer;border:3px solid #ff0000}
        .movie-title{font-size:1.3em;font-weight:bold;margin:15px 0 10px;color:#fff}
        .rating{display:inline-block;background:#ff0000;color:#fff;padding:8px 15px;border-radius:20px;font-weight:bold}
        .critics{display:inline-block;background:#ffd700;color:#000;padding:5px 12px;border-radius:15px;font-size:0.9em;margin-left:10px}
        .review{color:#ccc;font-style:italic;margin:10px 0}
        .time{color:#888;font-size:0.9em}
        .certified{background:#00ff00;color:#000;padding:5px 10px;border-radius:10px;font-size:0.8em;font-weight:bold}
        @media(max-width:768px){.movie-grid{grid-template-columns:1fr;gap:15px}}
    </style>
</head>
<body>
    <div class="header">
        <h1>🎬 DAILY MOVIES</h1>
        <p>25 New Movies Every Day - Auto Updated!</p>
    </div>
    
    <div id="movies" class="movie-grid"></div>

    <script>
        fetch('posts.json')
            .then(r=>r.json())
            .then(posts=>{
                document.getElementById('movies').innerHTML = posts.map(post=>`
                    <div class="movie-card">
                        <a href="movie-details.html?title=${encodeURIComponent(post.title)}">
                            <img src="${post.image}" class="movie-poster" alt="${post.title}">
                        </a>
                        <div class="movie-title">${post.title}</div>
                        <div>
                            <span class="rating">⭐ ${post.rating}</span>
                            <span class="critics">${post.critics}</span>
                        </div>
                        <div class="review">${post.review}</div>
                        <div class="time">${post.time}</div>
                        ${post.is_certified ? '<span class="certified">✅ CERTIFIED</span>' : ''}
                    </div>
                `).join('');
            });
    </script>
</body>
</html>

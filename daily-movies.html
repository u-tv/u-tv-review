<!DOCTYPE html>
<html>
<head>
<title>Daily Movies</title>
<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,200px);gap:20px}
.card{background:#111;border-radius:10px;padding:15px;text-align:center}
img{width:100%;height:150px;object-fit:cover;border-radius:8px}
.title{font-weight:bold;font-size:14px;margin:10px 0}
.rating{color:#ffd700}
</style>
</head>
<body>
<h1>🎬 Daily Movies</h1>
<div id="grid" class="grid">Loading...</div>

<script>
async function load(){
  try{
    const res=await fetch('posts.json');
    const data=await res.json();
    document.getElementById('grid').innerHTML=data.slice(-5).map(post=>`
      <div class="card">
        <img src="${post.image}" onerror="this.src='https://via.placeholder.com/200x150'">
        <div class="title">${post.title}</div>
        <div class="rating">⭐ ${post.rating}</div>
        <div>${post.review}</div>
      </div>
    `).join('');
  }catch{
    document.getElementById('grid').innerHTML='<p>No data</p>';
  }
}
load();
</script>
</body>
</html>

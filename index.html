<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-TV REVIEW - Ultimate Movie Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen">
    
    <!-- Navbar + Verified Badge -->
    <nav class="fixed top-0 w-full z-50 bg-black/95 backdrop-blur-xl border-b border-orange-500/30 p-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fas fa-crown text-3xl text-orange-500"></i>
            <span class="font-black text-2xl bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent">U-TV REVIEW</span>
            <span id="apiStatus" class="ml-2 px-2 py-1 bg-green-500 text-xs rounded-full font-bold">API LIVE</span>
        </div>
        <div class="flex items-center space-x-4">
            <!-- Search -->
            <div class="relative">
                <input id="searchInput" type="text" placeholder="🔍 Search 1M+ movies..." 
                       class="px-5 py-3 bg-gray-800/50 backdrop-blur-sm border border-gray-600 rounded-2xl w-72 focus:outline-none focus:ring-4 focus:ring-orange-400/50 transition-all duration-300">
                <i class="fas fa-search absolute right-4 top-3 text-gray-400"></i>
            </div>
            <!-- Watchlist Button -->
            <button id="watchlistBtn" class="p-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all group">
                <i class="fas fa-heart text-xl group-hover:text-white"></i>
                <span class="absolute hidden group-hover:block bg-black px-2 py-1 rounded text-xs mt-1">Watchlist (<span id="watchlistCount">0</span>)</span>
            </button>
            <!-- Contributor Login -->
            <button id="contributorBtn" class="p-3 bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 rounded-2xl transition-all">
                <i class="fas fa-user-edit"></i>
            </button>
        </div>
    </nav>

    <!-- Filters + Stats -->
    <div class="fixed top-20 w-full z-40 bg-black/80 backdrop-blur-md p-6 border-b border-gray-800">
        <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
            <button class="filter-btn active px-6 py-3 bg-gradient-to-r from-orange-500 to-orange-600 rounded-2xl font-bold shadow-lg hover:shadow-orange-500/50 transition-all" data-filter="trending">
                <i class="fas fa-fire mr-2"></i>Trending
            </button>
            <button class="filter-btn px-6 py-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all" data-filter="top250">
                <i class="fas fa-star mr-2"></i>Top 250
            </button>
            <button class="filter-btn px-6 py-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all" data-filter="popular">
                <i class="fas fa-users mr-2"></i>Popular
            </button>
            <button class="filter-btn px-6 py-3 bg-gray-800 hover:bg-green-500 rounded-2xl transition-all" data-filter="reviews">
                <i class="fas fa-newspaper mr-2"></i>Daily Reviews
            </button>
            <button class="filter-btn px-6 py-3 bg-gray-800 hover:bg-purple-500 rounded-2xl transition-all" data-filter="recommend">
                <i class="fas fa-magic mr-2"></i>AI Recs
            </button>
        </div>
        <!-- Live Stats -->
        <div class="grid grid-cols-4 gap-4 text-sm opacity-80">
            <div><i class="fas fa-eye mr-1"></i>2.4M Views</div>
            <div><i class="fas fa-dollar-sign mr-1"></i>$1.2B Box Office</div>
            <div><i class="fas fa-award mr-1"></i>47 Oscars</div>
            <div><i class="fas fa-users mr-1"></i>1.8K Reviews</div>
        </div>
    </div>

    <!-- Trending Hero Slider -->
    <div class="pt-52 pb-8 px-6">
        <div id="trendingHero" class="grid grid-cols-5 gap-6 mb-12 auto-rows-fr">
            <!-- Dynamic trending movies -->
        </div>
        
        <!-- Main Content Grid -->
        <div id="mainContent" class="grid grid-cols-2 lg:grid-cols-4 2xl:grid-cols-6 gap-8">
            <!-- Dynamic content -->
        </div>
    </div>

    <!-- Watchlist Modal -->
    <div id="watchlistModal" class="fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-sm">
        <div class="max-w-4xl mx-auto mt-24 p-8">
            <div class="bg-gradient-to-br from-gray-900 to-black border border-orange-500/50 rounded-3xl p-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black bg-gradient-to-r from-orange-400 to-yellow-400 bg-clip-text text-transparent">
                        <i class="fas fa-heart mr-3"></i>My Watchlist
                    </h2>
                    <button onclick="closeWatchlist()" class="text-3xl hover:text-orange-400">&times;</button>
                </div>
                <div id="watchlistContent" class="grid grid-cols-4 gap-6">
                    <p class="col-span-4 text-center py-12 text-gray-500">No movies in watchlist yet!</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Movie Detail Modal -->
    <div id="movieModal" class="fixed inset-0 z-[60] hidden bg-black/95 backdrop-blur-md">
        <div class="max-w-6xl mx-auto mt-16 p-8">
            <div class="bg-gradient-to-br from-gray-900/90 to-black/50 backdrop-blur-xl border border-orange-500/30 rounded-3xl overflow-hidden">
                <div id="modalContent"></div>
            </div>
        </div>
    </div>

    <!-- Contributor Panel -->
    <div id="contributorModal" class="fixed inset-0 z-[70] hidden bg-black/95 backdrop-blur-md flex items-center justify-center">
        <div class="bg-gradient-to-br from-purple-900 to-pink-900 border-4 border-purple-500/50 rounded-3xl p-12 max-w-md w-full mx-8">
            <h2 class="text-3xl font-black text-white mb-8 text-center">Contributor Panel</h2>
            <div class="space-y-6">
                <input type="password" id="adminPass" placeholder="Admin Key" 
                       class="w-full p-4 bg-black/50 border-2 border-purple-400 rounded-2xl text-white placeholder-gray-400 focus:border-purple-500 focus:outline-none">
                <button onclick="loginAdmin()" class="w-full p-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold text-xl hover:from-purple-700 transition-all shadow-lg">
                    Enter Editor Mode
                </button>
            </div>
        </div>
    </div>

<script>
    // API Configuration
    const TMDB_API_KEY = '5bf61a62fd4647aa7debed7d6f2db079';
    const GEMINI_API_KEY = 'AIzaSyBTLkHyTKZpBEnZZvgTqAm0kvvmF38kgnE';
    const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
    
    // State Management
    let watchlist = JSON.parse(localStorage.getItem('utv-watchlist')) || [];
    let currentFilter = 'trending';
    let isAdmin = false;

    // Update UI Counters
    function updateWatchlistCount() {
        document.getElementById('watchlistCount').textContent = watchlist.length;
    }

    // Enhanced Movie Card with All Features
    function createMovieCard(movie, isReview = false) {
        const score = Math.round(movie.vote_average * 10) || parseInt(movie.rating);
        const isCertified = score >= 90 || movie.is_certified;
        const isWatchlisted = watchlist.some(w => w.id === movie.id);
        
        return `
            <div class="group relative bg-gradient-to-br from-gray-800/70 to-black/50 backdrop-blur-sm border border-gray-700/50 rounded-3xl p-6 hover:border-orange-400/70 hover:shadow-2xl hover:shadow-orange-500/20 transition-all duration-500 cursor-pointer overflow-hidden h-full flex flex-col" onclick="showDetail(${movie.id || 'null'})">
                ${isWatchlisted ? '<div class="absolute top-4 right-4 z-10"><i class="fas fa-heart-fill text-red-400 text-xl animate-pulse"></i></div>' : ''}
                
                <div class="relative mb-6">
                    <img src="${movie.poster_path ? IMG_BASE + movie.poster_path : movie.image}" 
                         alt="${movie.title}" 
                         class="w-full h-64 lg:h-72 object-cover rounded-2xl group-hover:scale-105 transition-transform duration-700">
                    ${isCertified ? '<div class="absolute top-4 left-4 bg-gradient-to-r from-green-500 to-emerald-500 text-white px-4 py-2 rounded-full text-xs font-black shadow-lg">CERTIFIED FRESH</div>' : ''}
                </div>
                
                <div class="flex-1 flex flex-col">
                    <h3 class="font-black text-xl mb-4 line-clamp-2 group-hover:text-orange-400 transition-colors">${movie.title}</h3>
                    
                    <!-- Dual Rating System -->
                    <div class="flex justify-between items-end mb-6 space-y-2">
                        <div class="space-y-2">
                            <div class="flex items-center">
                                <span class="text-2xl font-black text-orange-400">${score}%</span>
                                <span class="ml-2 text-sm text-gray-400 font-medium">Audience</span>
                            </div>
                            <div class="flex items-center">
                                <span class="text-xl font-bold text-yellow-400">${movie.vote_average?.toFixed(1) || movie.rating}/10</span>
                                <span class="ml-2 text-xs text-gray-400">${movie.vote_count || 'Certified'}</span>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); toggleWatchlist(${movie.id || 'null'}, '${movie.title}', '${movie.poster_path}')">
                            <i class="fas fa-heart text-2xl p-2 rounded-2xl bg-white/10 hover:bg-red-500/30 transition-all ${isWatchlisted ? 'text-red-400 scale-110' : 'text-gray-400 hover:scale-110'}"></i>
                        </button>
                    </div>
                    
                    <!-- Meta Info -->
                    <div class="flex items-center justify-between text-xs text-gray-400 mb-4">
                        <span><i class="fas fa-calendar mr-1"></i>${movie.release_date?.slice(0,4) || 'N/A'}</span>
                        ${movie.critics ? `<span><i class="fas fa-users mr-1"></i>${movie.critics}</span>` : ''}
                    </div>
                    
                    ${isReview ? `
                        <p class="text-sm text-gray-300 line-clamp-3 mb-4">${movie.review}</p>
                        <div class="text-xs bg-green-500/20 text-green-300 px-3 py-1 rounded-full font-medium flex items-center">
                            <i class="fas fa-check-circle mr-1"></i>Verified Review • ${movie.time}
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }

    // Load Content Sections
    async function loadContent(filter = 'trending') {
        const content = document.getElementById('mainContent');
        currentFilter = filter;
        
        try {
            let data = [];
            
            if (filter === 'reviews') {
                try {
                    const res = await fetch('/posts.json');
                    data = await res.json();
                } catch {
                    data = [{title: 'Daily reviews loading...', image: '', rating: 8.5}];
                }
            } else {
                const endpoint = {
                    trending: '/3/trending/movie/week',
                    top250: '/3/movie/top_rated',
                    popular: '/3/movie/popular'
                }[filter] || '/3/trending/movie/week';
                
                const res = await fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${TMDB_API_KEY}`);
                const json = await res.json();
                data = json.results || [];
            }
            
            content.innerHTML = data.slice(0, 24).map(movie => createMovieCard(movie, filter === 'reviews')).join('');
            
        } catch (error) {
            content.innerHTML = '<div class="col-span-full text-center py-32 text-gray-500"><i class="fas fa-wifi text-6xl mb-4 opacity-50"></i><p>Content loading... Check connection</p></div>';
        }
    }

    // Enhanced Movie Detail Modal
    async function showDetail(id) {
        const modal = document.getElementById('movieModal');
        const content = document.getElementById('modalContent');
        
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&append_to_response=reviews,credits,videos,similar`);
            const movie = await res.json();
            
            content.innerHTML = `
                <div class="grid lg:grid-cols-2 gap-12 relative">
                    <!-- Backdrop + Poster -->
                    <div class="relative order-2 lg:order-1">
                        <img src="${IMG_BASE}${movie.backdrop_path || movie.poster_path}" alt="${movie.title}" class="w-full aspect-video object-cover rounded-3xl shadow-2xl">
                        <img src="${IMG_BASE}${movie.poster_path}" alt="${movie.title}" class="absolute -bottom-16 left-6 w-32 border-4 border-gray-900/80 rounded-2xl shadow-2xl z-10">
                    </div>
                    
                    <!-- Main Info -->
                    <div class="order-1 lg:order-2 flex flex-col justify-center">
                        <div class="flex items-baseline gap-6 mb-8">
                            <span class="text-5xl font-black bg-gradient-to-r from-orange-400 to-yellow-400 bg-clip-text text-transparent">${Math.round(movie.vote_average * 10)}%</span>
                            <span class="text-4xl font-bold text-yellow-400">${movie.vote_average?.toFixed(1)}/10</span>
                            <span class="text-2xl text-gray-400">${movie.vote_count} votes</span>
                        </div>
                        
                        ${movie.vote_average >= 7.5 ? '<div class="mb-8"><span class="bg-gradient-to-r from-green-500 to-emerald-600 px-8 py-3 rounded-full text-xl font-black shadow-lg">CERTIFIED FRESH</span></div>' : ''}
                        
                        <h1 class="text-4xl lg:text-5xl font-black mb-6 bg-gradient-to-r from-white to-gray-200 bg-clip-text">${movie.title}</h1>
                        
                        <!-- Scores Grid -->
                        <div class="grid grid-cols-2 gap-8 mb-12 p-8 bg-black/30 rounded-3xl backdrop-blur-sm">
                            <div>
                                <div class="text-sm font-medium text-gray-400 mb-2">Audience Score</div>
                                <div class="text-3xl font-black text-orange-400">${Math.round(movie.vote_average * 10)}%</div>
                            </div>
                            <div>
                                <div class="text-sm font-medium text-gray-400 mb-2">Critics Score</div>
                                <div class="text-3xl font-bold text-green-400">85% <span class="text-sm">(Avg)</span></div>
                            </div>
                            <div>
                                <div class="text-sm font-medium text-gray-400 mb-2">Box Office</div>
                                <div class="text-2xl font-bold text-blue-400">$${movie.revenue?.toLocaleString() || 'Live Tracking'}</div>
                            </div>
                            <div>
                                <div class="text-sm font-medium text-gray-400 mb-2">Runtime</div>
                                <div class="text-xl">${movie.runtime} min</div>
                            </div>
                        </div>
                        
                        <!-- Action Buttons -->
                        <div class="flex gap-4 mb-12">
                            <button onclick="toggleWatchlist(${movie.id}, '${movie.title}', '${movie.poster_path}')" class="flex-1 p-4 bg-gradient-to-r from-orange-500 to-orange-600 rounded-2xl font-bold text-lg hover:from-orange-600 shadow-lg transition-all">
                                <i class="fas fa-heart mr-2"></i>Add to Watchlist
                            </button>
                            <button onclick="generateAIReview('${movie.title}')" class="p-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl font-bold text-lg hover:from-purple-700 transition-all">
                                <i class="fas fa-robot mr-2"></i>AI Review
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Trailer + Cast -->
                <div class="grid lg:grid-cols-2 gap-12 mt-24 p-8 bg-black/20 rounded-3xl backdrop-blur-sm">
                    ${movie.videos?.results[0] ? `
                        <div>
                            <h3 class="text-2xl font-black mb-6 flex items-center"><i class="fas fa-play-circle mr-3 text-orange-400"></i>Official Trailer</h3>
                            <iframe class="w-full aspect-video rounded-2xl" src="https://www.youtube.com/embed/${movie.videos.results[0].key}" frameborder="0" allowfullscreen></iframe>
                        </div>
                    ` : ''}
                    
                    <div>
                        <h3 class="text-2xl font-black mb-6">Top Cast</h3>
                        <div class="flex flex-wrap gap-3">
                            ${movie.credits?.cast?.slice(0, 8).map(actor => `
                                <div class="p-3 bg-white/10 backdrop-blur-sm rounded-2xl cursor-pointer hover:bg-orange-500/20 transition-all group" onclick="showActor(${actor.id})">
                                    <img src="${IMG_BASE}${actor.profile_path}" alt="${actor.name}" class="w-20 h-20 rounded-xl object-cover mb-2 group-hover:scale-105">
                                    <div class="text-center text-sm font-medium">${actor.name.split(' ')[0]}</div>
                                </div>
                            `).join('') || '<p class="text-gray-500">Cast loading...</p>'}
                        </div>
                    </div>
                </div>
                
                <!-- AI Recommendations -->
                <div class="mt-16">
                    <h3 class="text-3xl font-black mb-12 flex items-center"><i class="fas fa-brain mr-3 text-purple-400"></i>AI Recommendations</h3>
                    <div id="recGrid" class="grid grid-cols-4 lg:grid-cols-6 gap-6"></div>
                </div>
            `;
            
            modal.classList.remove('hidden');
            if (movie.videos?.results[0]) loadRecommendations(movie);
        } catch (error) {
            content.innerHTML = '<div class="text-center py-24"><i class="fas fa-exclamation-triangle text-6xl text-orange-400 mb-6"></i><h2 class="text-2xl font-bold mb-4">Movie details loading failed</h2><p class="text-gray-400">Try refreshing or search again</p></div>';
            modal.classList.remove('hidden');
        }
    }

    // Watchlist Functions
    function toggleWatchlist(id, title, poster) {
        const index = watchlist.findIndex(w => w.id == id);
        if (index > -1) {
            watchlist.splice(index, 1);
        } else {
            watchlist.unshift({id, title, poster_path: poster});
        }
        localStorage.setItem('utv-watchlist', JSON.stringify(watchlist));
        updateWatchlistCount();
        loadContent(currentFilter);
    }

    function showWatchlist() {
        const modal = document.getElementById('watchlistModal');
        const content = document.getElementById('watchlistContent');
        
        if (watchlist.length === 0) {
            content.innerHTML = '<div class="col-span-4 text-center py-24 text-gray-400"><i class="fas fa-heart text-8xl mb-8 opacity-50"></i><p class="text-xl">Save movies to your watchlist!</p></div>';
        } else {
            content.innerHTML = watchlist.map(movie => createMovieCard(movie, false)).join('');
        }
        
        modal.classList.remove('hidden');
    }

    function closeWatchlist() {
        document.getElementById('watchlistModal').classList.add('hidden');
    }

    // Contributor Admin
    function showContributorPanel() {
        document.getElementById('contributorModal').classList.remove('hidden');
    }

    function loginAdmin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === 'utv2026') {  // Simple admin key
            isAdmin = true;
            document.getElementById('contributorModal').classList.add('hidden');
            alert('✅ Admin mode activated! Check console for editor tools.');
        } else {
            alert('❌ Wrong key');
        }
    }

    // AI Functions
    async function generateAIReview(title) {
        // Simulated AI review (full Gemini in production)
        alert(`🤖 AI Review for "${title}":

"Exceptional storytelling with breathtaking visuals. Must-watch! 8.7/10"`);
    }

    async function loadRecommendations(movie) {
        // Load similar movies
        try {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${movie.id}/similar?api_key=${TMDB_API_KEY}`);
            const data = await res.json();
            document.getElementById('recGrid').innerHTML = data.results.slice(0,12).map(m => `
                <div class="group cursor-pointer p-4 rounded-2xl hover:bg-orange-500/20 transition-all" onclick="showDetail(${m.id})">
                    <img src="${IMG_BASE}${m.poster_path}" class="w-full aspect-[2/3] object-cover rounded-xl group-hover:scale-105">
                    <h4 class="font-bold mt-3 line-clamp-1">${m.title}</h4>
                    <p class="text-sm text-orange-400">${Math.round(m.vote_average*10)}%</p>
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('recGrid').innerHTML = '<p class="col-span-full text-center text-gray-500">Recommendations loading...</p>';
        }
    }

    // Event Listeners
    document.addEventListener('DOMContentLoaded', function() {
        updateWatchlistCount();
        
        // Search
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (query) searchMovies(query);
            }
        });

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelector('.filter-btn.active').classList.remove('active');
                btn.classList.add('active');
                loadContent(btn.dataset.filter);
            });
        });

        // Watchlist button
        document.getElementById('watchlistBtn').addEventListener('click', e => {
            e.stopPropagation();
            showWatchlist();
        });

        // Contributor button
        document.getElementById('contributorBtn').addEventListener('click', showContributorPanel);

        // Close modals on overlay click
        document.querySelectorAll('[id$="Modal"]').forEach(modal => {
            modal.addEventListener('click', e => {
                if (e.target === modal) modal.classList.add('hidden');
            });
        });

        // Initial load
        loadTrendingHero();
        loadContent('trending');
    });

    async function loadTrendingHero() {
        const hero = document.getElementById('trendingHero');
        try {
            const res = await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${TMDB_API_KEY}`);
            const data = await res.json();
            hero.innerHTML = data.results.slice(0,10).map(movie => createMovieCard(movie)).join('');
        } catch(e) {
            hero.innerHTML = '<div class="col-span-5 text-center py-24 text-gray-500"><i class="fas fa-spinner fa-spin text-6xl mb-4"></i></div>';
        }
    }

    async function searchMovies(query) {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?query=${encodeURIComponent(query)}&api_key=${TMDB_API_KEY}`);
            const data = await res.json();
            document.getElementById('mainContent').innerHTML = data.results.map(movie => createMovieCard(movie)).join('');
        } catch(e) {
            console.error('Search failed:', e);
        }
    }

    function closeModal() {
        document.getElementById('movieModal').classList.add('hidden');
    }

    function showActor(id) {
        alert(`🎭 Actor profile for ID ${id} - Full profiles coming in Phase 3!`);
    }
</script>

<style>
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
</style>

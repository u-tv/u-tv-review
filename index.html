 <meta charset="UTF-8">

<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen">
    
    <nav class="fixed top-0 w-full z-50 bg-black/95 backdrop-blur-xl border-b border-orange-500/30 p-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fas fa-crown text-3xl text-orange-500"></i>
            <span class="font-black text-2xl bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent">U-TV REVIEW</span>
            <span id="apiStatus" class="ml-2 px-2 py-1 bg-green-500 text-xs rounded-full font-bold uppercase tracking-wider">Verified</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative hidden md:block">
                <input id="searchInput" type="text" placeholder="🔍 Search movies..." 
                       class="px-5 py-3 bg-gray-800/50 border border-gray-600 rounded-2xl w-72 focus:outline-none focus:ring-4 focus:ring-orange-400/50 transition-all">
            </div>
            <button id="watchlistBtn" class="p-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all relative">
                <i class="fas fa-heart text-xl"></i>
                <span id="watchlistCount" class="absolute -top-1 -right-1 bg-red-500 text-[10px] px-1.5 rounded-full">0</span>
            </button>
            <button id="contributorBtn" class="p-3 bg-gradient-to-r from-purple-600 to-pink-600 rounded-2xl">
                <i class="fas fa-user-edit"></i>
            </button>
        </div>
    </nav>

    <div class="fixed top-20 w-full z-40 bg-black/80 backdrop-blur-md p-6 border-b border-gray-800">
        <div class="flex space-x-4 overflow-x-auto pb-2 no-scrollbar">
            <button class="filter-btn active whitespace-nowrap px-6 py-3 bg-orange-600 rounded-2xl font-bold transition-all" data-filter="trending">Trending</button>
            <button class="filter-btn whitespace-nowrap px-6 py-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all" data-filter="top250">Top 250</button>
            <button class="filter-btn whitespace-nowrap px-6 py-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all" data-filter="popular">Popular</button>
            <button class="filter-btn whitespace-nowrap px-6 py-3 bg-gray-800 hover:bg-green-500 rounded-2xl transition-all" data-filter="reviews">Human Reviews</button>
        </div>
    </div>

    <div class="pt-52 pb-8 px-6">
        <div class="mb-10 flex justify-center">
            <script async="async" data-cfasync="false" src="https://pl28841136.effectivegatecpm.com/3fad0f227ed5eaaf99fe3342e5709c04/invoke.js"></script>
            <div id="container-3fad0f227ed5eaaf99fe3342e5709c04"></div>
        </div>

        <div id="mainContent" class="grid grid-cols-2 lg:grid-cols-4 2xl:grid-cols-6 gap-8">
            </div>

        <div class="my-12 py-6 border-y border-gray-800 flex justify-center">
            <script async data-cfasync="false" src="https://pl28735283.effectivegatecpm.com/745c1ef3a6af871203febf2e53f94279/invoke.js"></script>
            <div id="container-745c1ef3a6af871203febf2e53f94279"></div>
        </div>
    </div>

    <div id="movieModal" class="fixed inset-0 z-[60] hidden bg-black/95 backdrop-blur-md overflow-y-auto">
        <div class="max-w-6xl mx-auto my-16 p-4 md:p-8">
            <div class="bg-gray-900 border border-orange-500/30 rounded-3xl overflow-hidden" id="modalContent"></div>
        </div>
    </div>

    <div id="watchlistModal" class="fixed inset-0 z-50 hidden bg-black/90 backdrop-blur-sm overflow-y-auto">
        <div class="max-w-4xl mx-auto mt-24 p-8">
            <div class="bg-gray-900 border border-orange-500/50 rounded-3xl p-8">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-3xl font-black text-orange-400">My Watchlist</h2>
                    <button onclick="closeWatchlist()" class="text-3xl">&times;</button>
                </div>
                <div id="watchlistContent" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
            </div>
        </div>
    </div>

    <div id="contributorModal" class="fixed inset-0 z-[70] hidden bg-black/95 flex items-center justify-center">
        <div class="bg-gray-800 p-12 rounded-3xl max-w-md w-full mx-4">
            <h2 class="text-2xl font-bold mb-6 text-center">Admin Access</h2>
            <input type="password" id="adminPass" placeholder="Enter Key" class="w-full p-4 bg-black border border-purple-500 rounded-xl mb-4 text-white">
            <button onclick="loginAdmin()" class="w-full p-4 bg-purple-600 rounded-xl font-bold">Login</button>
        </div>
    </div>

<script>
    const TMDB_API_KEY = '5bf61a62fd4647aa7debed7d6f2db079';
    const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
    let watchlist = JSON.parse(localStorage.getItem('utv-watchlist')) || [];

    function updateWatchlistCount() {
        document.getElementById('watchlistCount').textContent = watchlist.length;
    }

    // HUMAN FEEL: Added "Time Ago" and "User Mood" to reviews
    function createMovieCard(movie, isReview = false) {
        const score = Math.round(movie.vote_average * 10) || 85;
        const timeAgo = ["2 hours ago", "Today", "Yesterday", "5 mins ago"][Math.floor(Math.random() * 4)];
        
        return `
            <div class="group relative bg-gray-800/40 border border-gray-700 rounded-3xl p-4 hover:border-orange-500 transition-all cursor-pointer" onclick="showDetail(${movie.id})">
                <img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/500x750'}" class="w-full h-72 object-cover rounded-2xl mb-4">
                <h3 class="font-bold text-lg mb-2 line-clamp-1">${movie.title}</h3>
                <div class="flex justify-between items-center">
                    <span class="text-orange-400 font-black">${score}% Match</span>
                    <button onclick="event.stopPropagation(); toggleWatchlist(${movie.id}, '${movie.title}', '${movie.poster_path}')">
                        <i class="fas fa-heart ${watchlist.some(w => w.id === movie.id) ? 'text-red-500' : 'text-gray-500'}"></i>
                    </button>
                </div>
                ${isReview ? `
                    <div class="mt-4 p-3 bg-black/40 rounded-xl border-l-4 border-green-500">
                        <p class="text-xs italic text-gray-300">"This is exactly what I was looking for. Great plot!"</p>
                        <div class="mt-2 text-[10px] text-gray-500 flex justify-between">
                            <span>By User_99</span>
                            <span>${timeAgo}</span>
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
    }

    async function loadContent(filter = 'trending') {
        const content = document.getElementById('mainContent');
        try {
            const endpoint = filter === 'top250' ? '/movie/top_rated' : (filter === 'popular' ? '/movie/popular' : '/trending/movie/week');
            const res = await fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${TMDB_API_KEY}`);
            const json = await res.json();
            
            // Mixing content with Ads triggers (Earning logic)
            content.innerHTML = json.results.map(movie => createMovieCard(movie, filter === 'reviews')).join('');
        } catch (e) {
            content.innerHTML = '<p class="col-span-full text-center">Connection Slow... Reloading</p>';
        }
    }

    async function showDetail(id) {
        const modal = document.getElementById('movieModal');
        const content = document.getElementById('modalContent');
        const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&append_to_response=videos`);
        const movie = await res.json();

        content.innerHTML = `
            <div class="p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-3xl font-black">${movie.title}</h2>
                    <button onclick="closeModal()" class="text-3xl">&times;</button>
                </div>
                <div class="grid md:grid-cols-2 gap-8">
                    <img src="${IMG_BASE + movie.backdrop_path}" class="rounded-3xl w-full shadow-2xl">
                    <div>
                        <p class="text-gray-300 text-lg mb-6 leading-relaxed">${movie.overview}</p>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-black/50 p-4 rounded-2xl">
                                <p class="text-gray-500 text-xs">Rating</p>
                                <p class="text-xl font-bold text-yellow-500">${movie.vote_average}/10</p>
                            </div>
                            <div class="bg-black/50 p-4 rounded-2xl">
                                <p class="text-gray-500 text-xs">Runtime</p>
                                <p class="text-xl font-bold">${movie.runtime} min</p>
                            </div>
                        </div>
                        <button class="w-full p-5 bg-orange-600 rounded-2xl font-black text-xl hover:scale-105 transition-transform">
                            <i class="fas fa-play mr-2"></i>WATCH NOW (HD)
                        </button>
                    </div>
                </div>
            </div>
        `;
        modal.classList.remove('hidden');
    }

    function toggleWatchlist(id, title, poster) {
        const index = watchlist.findIndex(w => w.id == id);
        if (index > -1) watchlist.splice(index, 1);
        else watchlist.unshift({id, title, poster_path: poster});
        localStorage.setItem('utv-watchlist', JSON.stringify(watchlist));
        updateWatchlistCount();
        loadContent();
    }

    function closeModal() { document.getElementById('movieModal').classList.add('hidden'); }
    function closeWatchlist() { document.getElementById('watchlistModal').classList.add('hidden'); }
    function loginAdmin() { if(document.getElementById('adminPass').value === 'utv2026') alert('Admin Active'); }

    document.addEventListener('DOMContentLoaded', () => {
        updateWatchlistCount();
        loadContent();
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelector('.filter-btn.active').classList.remove('active', 'bg-orange-600');
                btn.classList.add('active', 'bg-orange-600');
                loadContent(btn.dataset.filter);
            });
        });
        document.getElementById('watchlistBtn').onclick = () => {
            document.getElementById('watchlistContent').innerHTML = watchlist.map(m => createMovieCard(m)).join('');
            document.getElementById('watchlistModal').classList.remove('hidden');
        };
        document.getElementById('contributorBtn').onclick = () => document.getElementById('contributorModal').classList.remove('hidden');
    });
</script>

<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</style>

<script src="extra-movie-data/movie-extra.js"></script>

</body>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 U-TV Enhanced Reviews</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:linear-gradient(135deg,#0f0f23 0%,#1a1a2e 50%,#16213e 100%);color:#fff;min-height:100vh}
        .header{background:rgba(0,0,0,.95);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100;padding:25px;text-align:center}
        .header h1{font-size:2.8rem;background:linear-gradient(45deg,#ffd700,#ff6b35);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:25px}
        #searchInput{width:100%;max-width:600px;padding:18px 25px;font-size:1.2rem;border:3px solid #4a5568;border-radius:50px;background:rgba(26,32,44,.9);color:#fff;outline:none;transition:all .4s}
        #searchInput:focus{border-color:#ffd700;box-shadow:0 0 30px rgba(255,215,0,.4)}
        .movies-grid{max-width:1400px;margin:40px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:30px}
        .movie-card{background:rgba(26,32,44,.9);border:2px solid #2d3748;border-radius:25px;padding:30px;cursor:pointer;transition:all .4s;overflow:hidden}
        .movie-card:hover{transform:translateY(-20px);border-color:#ffd700;box-shadow:0 30px 60px rgba(255,215,0,.3)}
        .movie-poster{width:100%;height:380px;border-radius:20px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-size:5rem;margin-bottom:25px;position:relative;overflow:hidden}
        .movie-poster img{width:100%;height:100%;object-fit:cover}
        .rating-badge{position:absolute;top:20px;right:20px;background:#ffd700;color:#1a1a2e;padding:10px 18px;border-radius:30px;font-weight:800;font-size:1.1rem}
        .movie-title{font-size:1.6rem;font-weight:900;margin-bottom:18px;text-align:center;line-height:1.3}
        .movie-info{font-size:1rem;color:#a0aec0;margin-bottom:10px}
        .platform{color:#63b3ed;font-weight:700}
        .critics{background:rgba(255,215,0,.2);color:#ffd700;padding:5px 12px;border-radius:20px;font-size:.9rem;display:inline-block}
        .no-results,.loading{grid-column:1/-1;text-align:center;padding:80px;color:#ffd700}
        .spinner{width:60px;height:60px;border:4px solid #4a5568;border-top:4px solid #ffd700;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        @media (max-width:768px){.movies-grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <header class="header">
        <h1>🎬 U-TV Enhanced Reviews</h1>
        <input type="text" id="searchInput" placeholder="🔍 Wanted, Bajrangi, Avengers - कोई भी movie...">
    </header>

    <main class="movies-grid" id="moviesGrid">
        <div class="loading">
            <div class="spinner"></div>
            <p>तेरे daily auto-sync posts.json loading...</p>
        </div>
    </main>

    <script>
        // 🔥 TERE EXACT API KEY
        const IMDB_KEY = '5bf61a62fd4647aa7debed7d6f2db079';
        const OMDB_URL = `https://www.omdbapi.com/?apikey=${IMDB_KEY}`;
        let allMovies = [], currentMovie = null;

        document.addEventListener('DOMContentLoaded', async () => {
            await loadPostsData();
            setupEvents();
        });

        // 🔥 TERE posts.json के EXACT FORMAT के लिए
        async function loadPostsData() {
            const grid = document.getElementById('moviesGrid');
            try {
                const response = await fetch('posts.json');
                const posts = await response.json();
                
                allMovies = posts.map(post => ({
                    title: post.title.replace(' Review', ''), // "Avengers Review" → "Avengers"
                    image: post.image,
                    rating: post.rating,
                    review: post.review,
                    time: post.time,
                    critics: post.critics
                }));
                
                renderMovies(allMovies);
            } catch (error) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div style="font-size:4rem;margin-bottom:20px">🎥</div>
                        <p>posts.json load नहीं हो सका। Search करके नई movies लो!</p>
                    </div>
                `;
            }
        }

        // 🔥 UNIVERSAL IMDB SEARCH
        async function searchMovies(e) {
            const query = e.target.value.trim();
            if (query.length < 2) {
                renderMovies(allMovies);
                return;
            }

            const grid = document.getElementById('moviesGrid');
            grid.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>"${query}" IMDB से ला रहे हैं...</p>
                </div>
            `;

            try {
                const res = await fetch(`${OMDB_URL}&s=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                if (data.Response === 'True' && data.Search) {
                    renderMovies(data.Search.map(movie => ({
                        title: movie.Title,
                        image: movie.Poster,
                        rating: 'Live',
                        review: `${movie.Title} (${movie.Year}) - IMDB Live`,
                        time: 'Live',
                        critics: 'IMDB'
                    })));
                } else {
                    grid.innerHTML = `
                        <div class="no-results">
                            <div style="font-size:4rem">❌</div>
                            <p>"${query}" नहीं मिली</p>
                        </div>
                    `;
                }
            } catch {
                grid.innerHTML = `
                    <div class="no-results">
                        <div style="font-size:4rem">⚠️</div>
                        <p>Search error! फिर try करें</p>
                    </div>
                `;
            }
        }

        function renderMovies(movies) {
            const grid = document.getElementById('moviesGrid');
            if (!movies || !movies.length) {
                grid.innerHTML = `
                    <div class="no-results">
                        <div style="font-size:4rem">🎥</div>
                        <p>कोई movie नहीं। Search box में type करें!</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="showMovieDetail('${movie.title}','${movie.image}','${movie.rating}','${movie.review}','${movie.time}','${movie.critics}')">
                    <div class="movie-poster">
                        ${movie.image && movie.image.startsWith('http') ? 
                            `<img src="${movie.image}" alt="${movie.title}" onerror="this.outerHTML='<div style=\\"font-size:4rem\\">🎬</div>'">` : 
                            '🎬'
                        }
                    </div>
                    <div class="rating-badge">⭐ ${movie.rating}</div>
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-info">⏰ ${movie.time}</div>
                    <div class="movie-info"><span class="critics">${movie.critics}</span></div>
                    <div class="movie-info platform">${movie.review}</div>
                </div>
            `).join('');
        }

        function showMovieDetail(title, image, rating, review, time, critics) {
            currentMovie = { title, image, rating, review, time, critics };
            alert(`🎬 ${title}
⭐ Rating: ${rating}
⏰ Time: ${time}
📝 Review: ${review}

IMDB Search + Old Posts = BOTH WORKING! ✅`);
        }

        function setupEvents() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', debounce(searchMovies, 400));
            searchInput.addEventListener('keypress', e => {
                if (e.key === 'Enter') searchMovies({ target: { value: searchInput.value } });
            });
        }

        function debounce(fn, ms) {
            let timeout;
            return e => {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn(e), ms);
            };
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-TV REVIEW - Ultimate Movie Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;600;900&display=swap');

        :root { 
            --utv: #ff4f00; 
            --bg-deep: #05070a; 
            --surface: #0f1218; 
            --border: rgba(255,255,255,0.08);
            --neon-glow: 0 0 15px rgba(255,79,0,0.3);
        }

        body { 
            background: var(--bg-deep); 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }

        /* --- PROFESSIONAL 3D LOGO & NAME --- */
        .logo-3d-box {
            perspective: 1000px;
            cursor: pointer;
        }

        .logo-3d-text {
            font-family: 'Syncopate', sans-serif;
            font-weight: 900;
            font-size: 1.875rem; /* text-3xl */
            letter-spacing: -3px;
            position: relative;
            display: inline-block;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .logo-3d-u {
            color: #fff;
            text-shadow: -1px 1px 0 #ddd, -2px 2px 0 #ccc, -3px 3px 0 #bbb, -4px 4px 5px rgba(0,0,0,0.5);
        }

        .logo-3d-tv {
            color: var(--utv);
            text-shadow: -1px 1px 0 #cc3f00, -2px 2px 0 #992f00, -3px 3px 0 #661f00, -4px 4px 5px rgba(255,79,0,0.4);
        }

        .logo-3d-review {
            color: #fff;
            font-size: 1.5rem;
            margin-left: 5px;
            text-shadow: -1px 1px 0 #ddd, -2px 2px 0 #ccc, -3px 3px 0 #bbb, -4px 4px 5px rgba(0,0,0,0.5);
        }

        .logo-3d-box:hover .logo-3d-text {
            transform: rotateY(-15deg) rotateX(10deg);
        }

        /* --- REST OF THE PROFESSIONAL DARK THEME --- */
        .glass-nav {
            background: rgba(5, 7, 10, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .premium-card {
            background: var(--surface);
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .premium-card:hover {
            border-color: var(--utv);
            box-shadow: var(--neon-glow);
            transform: translateY(-8px);
        }

        .certified-glow {
            background: linear-gradient(45deg, #f39c12, #ffcc33);
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
            color: #000;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--utv); border-radius: 10px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4">
    <div class="max-w-[1700px] mx-auto flex items-center justify-between">
        <div class="flex items-center gap-10">
            <div class="logo-3d-box flex items-center" onclick="location.reload()">
                <div class="logo-3d-text">
                    <span class="logo-3d-u">U-</span><span class="logo-3d-tv">TV</span><span class="logo-3d-review">REVIEW</span>
                </div>
            </div>
            <div class="hidden xl:flex gap-8 text-[10px] font-black uppercase tracking-[0.2em] text-gray-500">
                <a href="#" class="hover:text-white transition">10. Top 250</a>
                <a href="#" class="hover:text-white transition">14. News</a>
                <a href="#" class="hover:text-white transition">17. Awards</a>
                <a href="#" class="hover:text-white transition">18. Industry</a>
            </div>
        </div>

        <div class="flex-1 max-w-2xl mx-10 relative">
            <div class="bg-white/5 border border-white/10 rounded-full px-5 py-2.5 flex items-center group focus-within:border-orange-500/50">
                <i class="fas fa-search text-gray-500 mr-3"></i>
                <input type="text" id="mainSearch" placeholder="Search Movie Database..." class="bg-transparent w-full outline-none text-sm">
            </div>
        </div>

        <div class="flex items-center gap-5">
            <button class="bg-white/5 hover:bg-white/10 px-5 py-2 rounded-full text-[10px] font-bold border border-white/10 transition">
                <i class="fas fa-bookmark mr-2 text-orange-500"></i> 8. WATCHLIST
            </button>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-orange-600 to-red-600 flex items-center justify-center font-bold text-xs border-2 border-white/10 cursor-pointer shadow-lg">
                CP
            </div>
        </div>
    </div>
</nav>

<main class="pt-32 px-8 max-w-[1700px] mx-auto pb-20">
    <div class="grid grid-cols-12 gap-10">
        <div class="col-span-12 lg:col-span-9 space-y-12">
            <section>
                <div class="flex items-center justify-between mb-8">
                    <h2 class="text-2xl font-black tracking-tighter uppercase"><span class="text-orange-500">#</span> 11. Trending Reviews</h2>
                    <div class="h-px flex-1 mx-6 bg-white/5"></div>
                </div>
                <div id="trendingGrid" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-5 gap-6"></div>
            </section>

            <section class="bg-white/[0.02] p-8 rounded-3xl border border-white/5">
                <h2 class="text-xl font-black mb-8 uppercase tracking-widest text-gray-400">13. Media Gallery</h2>
                <div id="trailerScroll" class="flex gap-6 overflow-x-auto no-scrollbar"></div>
            </section>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-8">
            <div class="premium-card rounded-3xl p-6 relative overflow-hidden">
                <h2 class="text-xs font-black uppercase tracking-widest text-orange-500 mb-6 flex items-center">
                    <span class="w-2 h-2 bg-orange-500 rounded-full mr-2 animate-pulse"></span> 5. Box Office Live
                </h2>
                <div id="boxOfficeList" class="space-y-5"></div>
            </div>

            <div class="premium-card rounded-3xl p-6">
                <h2 class="text-xs font-black uppercase text-gray-500 mb-6">16. Top Profiles</h2>
                <div id="actorList" class="grid grid-cols-4 gap-4"></div>
            </div>
        </div>
    </div>
</main>

<script>
    const TMDB = '174d0214bf933dd59b3d5ec68a0c967f';

    async function initU_TV() {
        try {
            // 1. Fetching AI Data from posts.json (Fixed Keys)
            const resPosts = await fetch('posts.json?' + new Date().getTime()); // Fresh data fetch
            const autoPosts = await resPosts.json();
            
            if(autoPosts && autoPosts.length > 0) {
                document.getElementById('trendingGrid').innerHTML = autoPosts.map(m => `
                    <div class="premium-card rounded-2xl overflow-hidden relative group">
                        <div class="absolute top-3 left-3 z-10 flex flex-col gap-1.5">
                            ${m.is_certified ? '<span class="certified-glow text-[8px] font-black px-2 py-0.5 rounded-sm">3. CERTIFIED</span>' : ''}
                            <span class="bg-blue-600/90 backdrop-blur-md text-white text-[8px] font-black px-2 py-0.5 rounded-sm">4. VERIFIED</span>
                        </div>
                        <div class="aspect-[2/3] overflow-hidden">
                            <img src="${m.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" onerror="this.src='https://via.placeholder.com/500x750?text=No+Poster'">
                        </div>
                        <div class="p-4 bg-gradient-to-b from-transparent to-black/90">
                            <h4 class="text-xs font-black truncate mb-1 text-white/90 uppercase">${m.title}</h4>
                            <p class="text-[10px] text-gray-400 mb-3 line-clamp-3">${m.review}</p>
                            <div class="flex gap-3">
                                <div class="flex-1 bg-white/5 border border-white/5 p-2 rounded-lg text-center">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase mb-0.5">1. Critics</div>
                                    <div class="text-sm font-black text-orange-500">${m.critics_score}</div>
                                </div>
                                <div class="flex-1 bg-white/5 border border-white/5 p-2 rounded-lg text-center">
                                    <div class="text-[7px] text-gray-500 font-bold uppercase mb-0.5">2. Audience</div>
                                    <div class="text-sm font-black text-green-500">${m.audience_score}%</div>
                                </div>
                            </div>
                            <div class="mt-2 text-[8px] text-gray-600 text-right italic">Updated: ${m.time}</div>
                        </div>
                    </div>
                `).join('');
            }

            // 2. Load Extra Data from TMDB for Sidebar/Gallery
            const trendingRes = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB}`);
            const trending = await trendingRes.json();

            document.getElementById('trailerScroll').innerHTML = trending.results.slice(0, 6).map(m => `
                <div class="min-w-[340px] aspect-video premium-card rounded-2xl relative overflow-hidden group cursor-pointer">
                    <img src="https://image.tmdb.org/t/p/w780${m.backdrop_path}" class="w-full h-full object-cover opacity-40 group-hover:opacity-60 transition duration-500">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <div class="w-12 h-12 bg-orange-600 rounded-full flex items-center justify-center shadow-2xl group-hover:scale-125 transition">
                            <i class="fas fa-play text-white text-xs"></i>
                        </div>
                    </div>
                    <div class="absolute bottom-4 left-5"><p class="text-[10px] font-black uppercase text-white tracking-widest">${m.title}</p></div>
                </div>
            `).join('');

            const boxData = ["Avatar 3 - $2.4B", "Pushpa 2 - ₹1340Cr", "Mufasa - $780M", "Superman 2025 - $910M"];
            document.getElementById('boxOfficeList').innerHTML = boxData.map((txt, i) => `
                <div class="flex items-center justify-between group">
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-black text-white/20">0${i+1}</span>
                        <span class="text-[11px] font-bold text-gray-300 group-hover:text-orange-500 transition">${txt}</span>
                    </div>
                    <i class="fas fa-caret-up text-green-500 text-xs"></i>
                </div>
            `).join('');

        } catch (e) {
            console.error("U-TV UI Sync Error: ", e);
        }
    }

    window.onload = initU_TV;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta name="google-site-verification" content="1XYvNp3KDylNaVS3TH15kSAKQHPIjMQZm_zIHLQBIt8" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U-TV REVIEW - Ultimate Movie Platform</title>
    
    <link rel="canonical" href="https://u-tv-review.pages.dev/" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://pl28841131.effectivegatecpm.com/ac/86/a2/ac86a2aaac667f889ea0944981159964.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-black text-white min-h-screen">
    
    <nav class="fixed top-0 w-full z-50 bg-black/95 backdrop-blur-xl border-b border-orange-500/30 p-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <i class="fas fa-crown text-3xl text-orange-500"></i>
            <span class="font-black text-2xl bg-gradient-to-r from-orange-400 to-red-500 bg-clip-text text-transparent">U-TV REVIEW</span>
        </div>
        <div class="flex items-center space-x-4">
            <div class="relative hidden md:block">
                <input id="searchInput" type="text" placeholder="🔍 Search any movie in the world..." 
                       class="px-5 py-3 bg-gray-800/50 border border-gray-600 rounded-2xl w-72 focus:outline-none focus:ring-4 focus:ring-orange-400/50 transition-all">
            </div>
            <button id="watchlistBtn" class="p-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all relative">
                <i class="fas fa-heart text-xl"></i>
            </button>
        </div>
    </nav>

    <div class="fixed top-20 w-full z-40 bg-black/80 backdrop-blur-md p-6 border-b border-gray-800">
        <div class="flex space-x-4 overflow-x-auto pb-2 no-scrollbar">
            <button class="filter-btn active whitespace-nowrap px-6 py-3 bg-orange-600 rounded-2xl font-bold transition-all" data-filter="trending">Trending</button>
            <button class="filter-btn whitespace-nowrap px-6 py-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all" data-filter="top250">Top 250</button>
            <button class="filter-btn whitespace-nowrap px-6 py-3 bg-gray-800 hover:bg-orange-500 rounded-2xl transition-all" data-filter="popular">Popular</button>
        </div>
    </div>

    <div class="pt-52 pb-8 px-6">
        <div class="mb-10 flex justify-center">
            <script async="async" data-cfasync="false" src="https://pl28841136.effectivegatecpm.com/3fad0f227ed5eaaf99fe3342e5709c04/invoke.js"></script>
            <div id="container-3fad0f227ed5eaaf99fe3342e5709c04"></div>
        </div>

        <div id="dailyFeaturedSection" class="mb-12">
            <h2 class="text-3xl font-black text-orange-400 mb-6 flex items-center">
                <i class="fas fa-fire-alt mr-3"></i> Today's Special Picks (Auto-Updated)
            </h2>
            <div id="dailyGrid" class="grid grid-cols-2 lg:grid-cols-5 gap-6 p-4 bg-orange-500/5 border border-orange-500/20 rounded-3xl"></div>
        </div>

        <div id="mainContent" class="grid grid-cols-2 lg:grid-cols-4 2xl:grid-cols-6 gap-8"></div>
        
        <div id="loader" class="flex justify-center py-10 hidden">
            <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <div id="movieModal" class="fixed inset-0 z-[60] hidden bg-black/95 backdrop-blur-md overflow-y-auto">
        <div class="max-w-6xl mx-auto my-16 p-4 md:p-8">
            <div class="bg-gray-900 border border-orange-500/30 rounded-3xl overflow-hidden" id="modalContent"></div>
        </div>
    </div>

    <script>
    (function() {
        const TMDB_API_KEY = '5bf61a62fd4647aa7debed7d6f2db079';
        const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
        let currentPage = 1;
        let currentFilter = 'trending';
        let isSearching = false;
        let isLoading = false;

        // 1. Daily Auto Posts (Fixed 5)
        async function loadDailyAutoPosts() {
            const res = await fetch(`https://api.themoviedb.org/3/movie/now_playing?api_key=${TMDB_API_KEY}&language=hi-IN`);
            const data = await res.json();
            const today = new Date().getDate();
            const dailyPicks = data.results.slice((today % 3) * 5, ((today % 3) * 5) + 5);
            document.getElementById('dailyGrid').innerHTML = dailyPicks.map(movie => `
                <div class="relative group cursor-pointer" onclick="showDetail(${movie.id})">
                    <img src="${IMG_BASE + movie.poster_path}" class="w-full h-64 object-cover rounded-2xl border border-white/10 group-hover:border-orange-500 transition-all">
                    <div class="mt-2 text-sm font-bold line-clamp-1">${movie.title}</div>
                </div>`).join('');
        }

        // 2. Main Unlimited Loader
        async function loadContent(append = false) {
            if (isLoading) return;
            isLoading = true;
            document.getElementById('loader').classList.remove('hidden');

            const endpoint = currentFilter === 'top250' ? '/movie/top_rated' : (currentFilter === 'popular' ? '/movie/popular' : '/trending/movie/week');
            try {
                const res = await fetch(`https://api.themoviedb.org/3${endpoint}?api_key=${TMDB_API_KEY}&language=hi-IN&page=${currentPage}`);
                const json = await res.json();
                
                const html = json.results.map(movie => `
                    <div class="bg-gray-800/40 border border-gray-700 rounded-3xl p-4 hover:border-orange-500 transition-all cursor-pointer" onclick="showDetail(${movie.id})">
                        <img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/500x750'}" class="w-full h-72 object-cover rounded-2xl mb-4">
                        <h3 class="font-bold text-lg mb-2 line-clamp-1">${movie.title}</h3>
                        <div class="text-orange-400 font-black">⭐ ${Math.round(movie.vote_average * 10)}% Score</div>
                    </div>`).join('');

                if (append) document.getElementById('mainContent').innerHTML += html;
                else document.getElementById('mainContent').innerHTML = html;
                
                currentPage++;
            } catch (e) { console.error("Load error"); }
            
            isLoading = false;
            document.getElementById('loader').classList.add('hidden');
        }

        // 3. Automatic Global Search
        async function searchGlobal(query) {
            if (!query) { isSearching = false; currentPage = 1; loadContent(); return; }
            isSearching = true;
            const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${query}&language=hi-IN`);
            const json = await res.json();
            document.getElementById('mainContent').innerHTML = json.results.map(movie => `
                <div class="bg-gray-800/40 border border-gray-700 rounded-3xl p-4 hover:border-orange-500 transition-all cursor-pointer" onclick="showDetail(${movie.id})">
                    <img src="${movie.poster_path ? IMG_BASE + movie.poster_path : 'https://via.placeholder.com/500x750'}" class="w-full h-72 object-cover rounded-2xl mb-4">
                    <h3 class="font-bold text-lg mb-2 line-clamp-1">${movie.title}</h3>
                </div>`).join('');
        }

        // 4. Detail View (Same as you like)
        window.showDetail = async function(id) {
            const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_API_KEY}&append_to_response=credits`);
            const movie = await res.json();
            document.getElementById('modalContent').innerHTML = `
                <div class="p-8">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-3xl font-black text-orange-500">${movie.title}</h2>
                        <button onclick="document.getElementById('movieModal').classList.add('hidden')" class="text-4xl">&times;</button>
                    </div>
                    <div class="grid lg:grid-cols-2 gap-10">
                        <img src="${IMG_BASE + movie.poster_path}" class="rounded-3xl w-full shadow-2xl">
                        <div class="space-y-6">
                            <div class="bg-white/5 p-6 rounded-3xl border border-white/10">
                                <h3 class="text-xl font-bold text-orange-400 mb-4">📖 Movie Analysis</h3>
                                <p class="text-gray-200 leading-relaxed">${movie.overview}</p>
                            </div>
                            <button class="w-full py-6 bg-gradient-to-r from-orange-600 to-red-600 rounded-2xl font-black text-2xl">WATCH FULL HD</button>
                        </div>
                    </div>
                </div>`;
            document.getElementById('movieModal').classList.remove('hidden');
        };

        // Infinite Scroll Listener
        window.onscroll = function() {
            if (!isSearching && (window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                loadContent(true);
            }
        };

        // Events
        document.getElementById('searchInput').addEventListener('input', (e) => searchGlobal(e.target.value));
        
        document.addEventListener('DOMContentLoaded', () => {
            loadDailyAutoPosts();
            loadContent();
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.filter-btn.active').classList.remove('active', 'bg-orange-600');
                    btn.classList.add('active', 'bg-orange-600');
                    currentFilter = btn.dataset.filter;
                    currentPage = 1;
                    loadContent();
                });
            });
        });
    })();
    </script>
    <style>.no-scrollbar::-webkit-scrollbar { display: none; }</style>
</body>
</html>

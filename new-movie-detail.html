<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 U-TV Daily Movie Reviews</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(16px);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(45deg, #ffd700, #ff6b35);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #a0aec0;
    }

    main {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 16px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
    }

    .card {
      background: rgba(26, 32, 44, 0.95);
      border-radius: 18px;
      border: 1px solid #2d3748;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-8px);
      border-color: #ffd700;
      box-shadow: 0 18px 40px rgba(255, 215, 0, 0.25);
    }

    .poster {
      position: relative;
      width: 100%;
      height: 340px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #ffd700;
      color: #1a1a2e;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 999px;
    }

    .content {
      padding: 16px 16px 18px;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .time {
      font-size: 0.8rem;
      color: #a0aec0;
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .rating {
      color: #ffd700;
      font-weight: 700;
    }

    .critics {
      background: rgba(255, 215, 0, 0.16);
      color: #ffd700;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 0.8rem;
    }

    .review {
      font-size: 0.9rem;
      color: #e2e8f0;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #ffd700;
      font-size: 1rem;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #4a5568;
      border-top-color: #ffd700;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🎬 U-TV Daily Movie Reviews</h1>
    <p class="subtitle">posts.json se auto-sync last reviews</p>
  </header>

  <main>
    <div id="status" class="empty-state">
      <div class="spinner"></div>
      <p>Latest reviews loading...</p>
    </div>
    <div id="grid" class="grid" style="display:none;"></div>
  </main>

  <script>
    async function loadPosts() {
      const statusEl = document.getElementById('status');
      const gridEl = document.getElementById('grid');

      try {
        const res = await fetch('posts.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        if (!Array.isArray(data) || data.length === 0) {
          statusEl.innerHTML = '<p>posts.json खाली है. Abhi koi review nahi hai.</p>';
          return;
        }

        // last 12 ya jitne tum chaho
        const items = data.slice(-12).reverse();

        gridEl.innerHTML = items.map(post => {
          const safeTitle = (post.title || '').replace(/"/g, '&quot;');
          const img = post.image && post.image.startsWith('http')
            ? `<img src="${post.image}" alt="${safeTitle}" onerror="this.parentNode.innerHTML='🎬';" />`
            : '🎬';

          return `
            <article class="card">
              <div class="poster">
                ${img}
                <div class="badge">⭐ ${post.rating || 'N/A'}</div>
              </div>
              <div class="content">
                <h2 class="title">${safeTitle}</h2>
                <div class="time">⏰ ${post.time || ''}</div>
                <div class="row">
                  <span class="rating">IMDB: ${post.rating || 'N/A'}</span>
                  <span class="critics">${post.critics || ''}</span>
                </div>
                <p class="review">${post.review || ''}</p>
              </div>
            </article>
          `;
        }).join('');

        statusEl.style.display = 'none';
        gridEl.style.display = 'grid';
      } catch (err) {
        console.error(err);
        statusEl.innerHTML = `
          <div class="spinner"></div>
          <p>posts.json load nahi ho paaya. Thodi der baad try karo.</p>
        `;
      }
    }

    document.addEventListener('DOMContentLoaded', loadPosts);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 U-TV Enhanced Movie Reviews</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: white; min-height: 100vh; overflow-x: hidden;
        }
        .header { 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(20px);
            position: sticky; top: 0; z-index: 100; padding: 25px; text-align: center;
        }
        .header h1 { 
            font-size: 2.8rem; background: linear-gradient(45deg, #ffd700, #ff6b35);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        #searchInput {
            width: 100%; max-width: 600px; padding: 18px 25px; font-size: 1.2rem;
            border: 3px solid #4a5568; border-radius: 50px; background: rgba(26,32,44,0.9);
            color: white; outline: none; transition: all 0.4s;
        }
        #searchInput:focus { border-color: #ffd700; box-shadow: 0 0 30px rgba(255,215,0,0.4); }
        
        .movies-grid { 
            max-width: 1400px; margin: 40px auto; padding: 0 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;
        }
        .movie-card {
            background: rgba(26,32,44,0.9); border: 2px solid #2d3748; border-radius: 25px;
            padding: 30px; cursor: pointer; transition: all 0.4s; overflow: hidden;
        }
        .movie-card:hover { transform: translateY(-20px); border-color: #ffd700; box-shadow: 0 30px 60px rgba(255,215,0,0.3); }
        .movie-poster {
            width: 100%; height: 380px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 5rem; margin-bottom: 25px; position: relative;
        }
        .rating-badge {
            position: absolute; top: 20px; right: 20px; background: #ffd700; color: #1a1a2e;
            padding: 10px 18px; border-radius: 30px; font-weight: 800; font-size: 1.1rem;
        }
        .movie-title { font-size: 1.6rem; font-weight: 900; margin-bottom: 18px; text-align: center; }
        .movie-info { font-size: 1rem; color: #a0aec0; margin-bottom: 10px; }
        .platform { color: #63b3ed; font-weight: 700; }
        
        /* Modal Styles */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal-content { background: rgba(26,32,44,0.98); border: 3px solid #ffd700; border-radius: 25px; padding: 40px; max-width: 1100px; max-height: 90vh; overflow-y: auto; width: 100%; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 25px; font-size: 2.5rem; background: none; border: none; color: #ffd700; cursor: pointer; }
        .lang-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .lang-btn { padding: 15px; border: 2px solid #4a5568; border-radius: 15px; background: transparent; color: white; cursor: pointer; transition: all 0.3s; font-weight: 600; }
        .lang-btn:hover, .lang-btn.active { background: rgba(255,215,0,0.2); border-color: #ffd700; }
        
        .no-results, .loading { grid-column: 1/-1; text-align: center; padding: 80px; color: #ffd700; }
        .spinner { width: 60px; height: 60px; border: 4px solid #4a5568; border-top: 4px solid #ffd700; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) { .movies-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="header">
        <h1>🎬 U-TV Enhanced Reviews</h1>
        <input type="text" id="searchInput" placeholder="🔍 Wanted, Bajrangi, Avengers - कोई भी movie search करें...">
    </header>

    <!-- Language Modal -->
    <div id="langModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeLangModal()">×</button>
            <h2 style="color: #ffd700; margin-bottom: 25px; font-size: 2rem;">🌐 भाषा चुनें</h2>
            <div id="languageList" class="lang-grid"></div>
        </div>
    </div>

    <!-- Movie Detail Modal -->
    <div id="movieModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div id="movieDetailContent"></div>
        </div>
    </div>

    <main class="movies-grid" id="moviesGrid">
        <div class="loading">
            <div class="spinner"></div>
            <p>Old auto-sync data + new IMDB data loading...</p>
        </div>
    </main>

    <script>
        // 🔥 YOUR API KEYS
        const IMDB_API_KEY = '5bf61a62fd4647aa7debed7d6f2db079';
        const GEMINI_API_KEY = 'AIzaSyBTLkHyTKZpBEnZZvgTqAm0kvvmF38kgnE';
        const OMDB_BASE = `https://www.omdbapi.com/?apikey=${IMDB_API_KEY}&`;
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_API_KEY}`;
        
        let allMovies = [], currentMovie = null, currentLang = 'हिंदी';
        const languages = ['हिंदी', 'English', 'తెలుగు', 'தமிழ்', 'मराठी', 'বাংলা', 'മലയാളം', 'ਪੰਜਾਬੀ', 'ગુજરાતી'];

        // Initialize - Load OLD data + enable search
        document.addEventListener('DOMContentLoaded', async function() {
            await loadOldAutoSyncData();
            setupEventListeners();
        });

        // 🔥 LOAD OLD DAILY AUTO-SYNC DATA (Backward Compatible)
        async function loadOldAutoSyncData() {
            try {
                const response = await fetch('/data/reviews.json');
                const oldData = await response.json();
                allMovies = oldData.map(movie => ({
                    id: movie.id || Math.random(),
                    title: movie.title || movie.name,
                    year: movie.year || movie.release_date?.split('-')[0] || 'N/A',
                    poster: movie.poster || movie.image || '🎬',
                    imdbID: movie.imdb_id || movie.id,
                    plot: movie.story || movie.description || 'Story loading...',
                    runtime: movie.runtime || 'N/A',
                    stars: movie.stars || movie.cast || 'N/A',
                    platform: movie.platform || 'Theatres/OTT'
                }));
                renderMovies(allMovies.slice(0, 12));
            } catch (error) {
                console.log('Old data not found, using fallback');
                renderMovies([]); // Empty grid - search will populate
            }
        }

        // 🔥 UNIVERSAL SEARCH - ANY MOVIE IN WORLD!
        async function searchMovies(e) {
            const query = e.target.value.trim();
            const moviesGrid = document.getElementById('moviesGrid');
            
            if (query.length < 2) {
                renderMovies(allMovies.slice(0, 12));
                return;
            }
            
            moviesGrid.innerHTML = `<div class="loading"><div class="spinner"></div><p>"${query}" IMDB से search कर रहे हैं...</p></div>`;
            
            try {
                const response = await fetch(`${OMDB_BASE}s=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.Response === 'True' && data.Search) {
                    const enhancedMovies = await Promise.all(data.Search.map(async movie => {
                        const details = await fetch(`${OMDB_BASE}i=${movie.imdbID}&plot=full`).then(r => r.json());
                        return {
                            id: movie.imdbID,
                            title: movie.Title,
                            year: movie.Year,
                            poster: movie.Poster,
                            imdbID: movie.imdbID,
                            plot: details.Plot || 'No plot available',
                            runtime: details.Runtime || 'N/A',
                            stars: details.Actors || 'N/A',
                            platform: details.Platform || 'Theatres/OTT',
                            rating: details.imdbRating || 'N/A'
                        };
                    }));
                    renderMovies(enhancedMovies);
                } else {
                    moviesGrid.innerHTML = `<div class="no-results"><div style="font-size:3rem;margin-bottom:20px">❌</div><p>"${query}" नहीं मिली</p></div>`;
                }
            } catch (error) {
                moviesGrid.innerHTML = `<div class="no-results"><div style="font-size:3rem;margin-bottom:20px">⚠️</div><p>Search error! फिर try करें</p></div>`;
            }
        }

        // Render movies grid
        function renderMovies(movies) {
            const moviesGrid = document.getElementById('moviesGrid');
            if (!movies || movies.length === 0) {
                moviesGrid.innerHTML = `<div class="no-results"><div style="font-size:3rem;margin-bottom:20px">🎥</div><p>कोई movie नहीं। Search करें!</p></div>`;
                return;
            }
            
            moviesGrid.innerHTML = movies.map(movie => `
                <div class="movie-card" onclick="openMovieModal(${JSON.stringify(movie)})">
                    <div class="movie-poster">${movie.poster !== 'N/A' ? `<img src="${movie.poster}" style="width:100%;height:100%;border-radius:20px;object-fit:cover;">` : '🎬'}</div>
                    <div class="rating-badge">⭐ ${movie.rating}</div>
                    <div class="movie-title">${movie.title}</div>
                    <div class="movie-info">⏱️ ${movie.runtime}</div>
                    <div class="movie-info">⭐ ${movie.stars?.split(',')[0] || 'N/A'}</div>
                    <div class="movie-info">📅 ${movie.year}</div>
                    <div class="movie-info platform">${movie.platform}</div>
                </div>
            `).join('');
        }

        // 🔥 Language Modal + AI Translation
        function openMovieModal(movie) {
            currentMovie = movie;
            showLanguageModal();
        }

        function showLanguageModal() {
            const list = document.getElementById('languageList');
            list.innerHTML = '';
            languages.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = `lang-btn ${currentLang === lang ? 'active' : ''}`;
                btn.textContent = lang;
                btn.onclick = () => selectLanguage(lang);
                list.appendChild(btn);
            });
            document.getElementById('langModal').classList.add('active');
        }

        async function selectLanguage(lang) {
            currentLang = lang;
            closeLangModal();
            await showTranslatedDetails();
        }

        async function showTranslatedDetails() {
            const content = document.getElementById('movieDetailContent');
            content.innerHTML = '<div class="loading" style="grid-column:unset"><div class="spinner"></div><p>Gemini AI से translate कर रहे हैं...</p></div>';
            document.getElementById('movieModal').classList.add('active');
            
            // AI Translation via Gemini
            try {
                const prompt = `Translate this movie plot to ${currentLang}: ${currentMovie.plot}`;
                const response = await fetch(GEMINI_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });
                const data = await response.json();
                const translatedPlot = data.candidates?.[0]?.content?.parts?.[0]?.text || currentMovie.plot;
                
                content.innerHTML = `
                    <div style="display:grid;grid-template-columns:1fr 2fr;gap:40px;">
                        <div>
                            <div class="movie-poster" style="height:450px;margin-bottom:30px;">${currentMovie.poster !== 'N/A' ? `<img src="${currentMovie.poster}" style="width:100%;height:100%;border-radius:20px;object-fit:cover;">` : '🎥'}</div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                                <div style="background:rgba(45,55,72,0.7);padding:20px;border-radius:15px;text-align:center;">
                                    <div style="color:#a0aec0;font-size:0.9rem;">📅 Release</div>
                                    <div style="font-size:1.8rem;font-weight:800;">${currentMovie.year}</div>
                                </div>
                                <div style="background:rgba(45,55,72,0.7);padding:20px;border-radius:15px;text-align:center;">
                                    <div style="color:#a0aec0;font-size:0.9rem;">⏱️ Runtime</div>
                                    <div style="font-size:1.8rem;font-weight:800;">${currentMovie.runtime}</div>
                                </div>
                                <div style="background:rgba(45,55,72,0.7);padding:20px;border-radius:15px;text-align:center;">
                                    <div style="color:#a0aec0;font-size:0.9rem;">⭐ Platform</div>
                                    <div style="font-size:1.8rem;font-weight:800;color:#63b3ed;">${currentMovie.platform}</div>
                                </div>
                            </div>
                        </div>
                        <div>
                            <h1 style="font-size:3rem;font-weight:900;color:#ffd700;margin-bottom:30px;">${currentMovie.title}</h1>
                            <div style="background:rgba(45,55,72,0.5);padding:30px;border-radius:20px;margin-bottom:25px;border-left:5px solid #ffd700;">
                                <h3 style="font-size:1.6rem;margin-bottom:20px;color:#ffd700;">📖 पूरी कहानी (${currentLang})</h3>
                                <p style="font-size:1.1rem;line-height:1.8;color:#e2e8f0;">${translatedPlot}</p>
                            </div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                                <div style="background:rgba(45,55,72,0.5);padding:25px;border-radius:15px;">
                                    <h4 style="color:#ffd700;font-size:1.3rem;margin-bottom:15px;">⭐ मुख्य कलाकार</h4>
                                    <p style="font-size:1.1rem;">${currentMovie.stars}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                // Fallback to original plot if AI fails
                content.innerHTML = `
                    <div style="display:grid;grid-template-columns:1fr 2fr;gap:40px;">
                        <div><div class="movie-poster" style="height:450px;">${currentMovie.poster !== 'N/A' ? `<img src="${currentMovie.poster}" style="width:100%;height:100%;border-radius:20px;object-fit:cover;">` : '🎥'}</div></div>
                        <div>
                            <h1 style="font-size:3rem;font-weight:900;color:#ffd700;">${currentMovie.title}</h1>
                            <div style="background:rgba(45,55,72,0.5);padding:30px;border-radius:20px;margin-bottom:25px;">
                                <h3 style="font-size:1.6rem;margin-bottom:20px;color:#ffd700;">📖 Story (${currentLang})</h3>
                                <p style="font-size:1.1rem;line-height:1.8;">${currentMovie.plot}</p>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', debounce(searchMovies, 400));
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchMovies({target: {value: this.value}});
            });
        }

        function closeLangModal() { document.getElementById('langModal').classList.remove('active'); }
        function closeModal() { document.getElementById('movieModal').classList.remove('active'); }
        
        function debounce(fn, ms) {
            let timeout; return e => { clearTimeout(timeout); timeout = setTimeout(() => fn(e), ms); };
        }

        // Close modals on outside click
        document.getElementById('langModal').onclick = e => e.target.id === 'langModal' && closeLangModal();
        document.getElementById('movieModal').onclick = e => e.target.id === 'movieModal' && closeModal();
    </script>
</body>
</html>

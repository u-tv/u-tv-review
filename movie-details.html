<!DOCTYPE html>
<html>
<head>
    <title>Movie Details - UTV Review</title>
    <meta name="viewport" content="width=device-width">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:#000;color:#fff;padding:20px;line-height:1.6}
        .back-btn{background:#ff0000;color:#fff;padding:15px 25px;text-decoration:none;border-radius:25px;display:inline-block;margin-bottom:30px;font-weight:bold}
        .container{max-width:1000px;margin:0 auto}
        .poster{float:left;width:300px;height:450px;object-fit:cover;margin-right:30px;border:4px solid #ff0000;border-radius:15px}
        .movie-header h1{font-size:2.5em;color:#ff0000;margin-bottom:15px}
        .rating{background:#ff0000;color:#fff;padding:12px 20px;border-radius:30px;font-weight:bold;font-size:1.2em;display:inline-block}
        .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0}
        .collection{color:#ffd700;font-size:1.5em;font-weight:bold}
        .ott{background:#00ff00;color:#000;padding:10px 15px;border-radius:20px;font-weight:bold}
        .director,.release{font-size:1.2em;color:#00bfff}
        .story-section{margin-top:40px}
        .story-section h2{font-size:1.8em;color:#ff0000;margin-bottom:20px}
        .story-text{font-size:1.1em;line-height:1.8;text-align:justify}
        .clear{clear:both}
        @media(max-width:768px){
            .poster{float:none;margin:0 auto 30px;display:block}
            .info-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
    <a href="daily-movies.html" class="back-btn">← Back to Movies</a>
    
    <div class="container">
        <div id="movieData"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const movieTitle = decodeURIComponent(urlParams.get('title') || '');
        
        fetch('posts.json?t='+Date.now())
            .then(r=>r.json())
            .then(posts=>{
                const movie = posts.find(p=>p.title===movieTitle);
                if(movie){
                    document.getElementById('movieData').innerHTML = `
                        <img src="${movie.image}" class="poster" alt="${movie.title}">
                        <div>
                            <h1>${movie.title}</h1>
                            <div class="rating">⭐ ${movie.rating} (${movie.critics})</div>
                            
                            <div class="info-grid">
                                <div class="collection">💰 Worldwide: $${(movie.rating*100).toLocaleString('en-US')}M</div>
                                <div class="ott">📺 Netflix | Prime | Hotstar</div>
                                <div class="director">🎬 Hollywood Blockbuster 2026</div>
                                <div class="release">📅 Worldwide Release</div>
                            </div>
                            
                            <div class="story-section">
                                <h2>📖 Complete Story & Analysis</h2>
                                <div class="story-text">
                                    "${movie.title}" is a cinematic masterpiece that has captivated audiences worldwide. 
                                    This blockbuster combines breathtaking action sequences, unforgettable performances, 
                                    and cutting-edge visual effects that push the boundaries of modern filmmaking.
                                    
                                    The gripping storyline follows complex characters through high-stakes drama, 
                                    blending emotional depth with spectacular visual spectacle. Every frame is 
                                    meticulously crafted, showcasing Hollywood's finest talent at work.
                                    
                                    With record-breaking box office collections and universal acclaim, this film 
                                    has become a cultural phenomenon. Available now on all major OTT platforms 
                                    for your viewing pleasure. Perfect for movie nights with family and friends!
                                    
                                    Don't miss this essential cinematic experience that will be talked about 
                                    for generations to come. ⭐⭐⭐⭐⭐
                                </div>
                            </div>
                        </div>
                        <div class="clear"></div>
                    `;
                } else {
                    document.getElementById('movieData').innerHTML = '<h2>Movie not found!</h2>';
                }
            });
    </script>
</body>
</html>
